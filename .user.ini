; Raise PHP limits so large base64 document/photo uploads are not discarded.
; Applies to PHP running as CGI/FastCGI/FPM (the cPanel default).
; NOTE: changes can take a few minutes to apply (PHP caches .user.ini ~300s).
post_max_size = 64M
upload_max_filesize = 64M
memory_limit = 256M
max_execution_time = 120

; Stop PHP from auto-reading the POST body. This prevents PHP from creating an
; upload temp file (host's PHP-FPM has no usable upload_tmp_dir -> UPLOAD_ERR_NO_TMP_DIR / error 6).
; upload.php instead reads the raw multipart body from php://input and parses it itself.
; NOTE: $_POST / $_FILES become empty everywhere; api.php & convert.php already read
; php://input directly, so they are unaffected.
enable_post_data_reading = Off
